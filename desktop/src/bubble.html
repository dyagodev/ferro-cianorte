<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 72px;
        height: 72px;
        background: transparent;
        overflow: hidden;
        user-select: none;
      }

      #bubble {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
        cursor: grab;
        border: 2px solid rgba(255, 255, 255, 0.25);
        overflow: hidden;
      }

      #bubble:active {
        cursor: grabbing;
      }

      #bubble img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
        -webkit-user-drag: none;
      }
    </style>
  </head>
  <body>
    <div id="bubble">
      <img src="../assets/icon.png" alt="Ferro Cianorte" />
    </div>
    <script>
      const bubble = document.getElementById("bubble");
      const DRAG_THRESHOLD = 4;

      let dragging = false;
      let moved = false;
      let startScreenX = 0;
      let startScreenY = 0;
      // Distância do cursor até o canto da janela, pra manter o "grip" ao arrastar.
      let grabOffsetX = 0;
      let grabOffsetY = 0;

      bubble.addEventListener("mousedown", (event) => {
        dragging = true;
        moved = false;
        startScreenX = event.screenX;
        startScreenY = event.screenY;
        grabOffsetX = event.screenX - window.screenX;
        grabOffsetY = event.screenY - window.screenY;
      });

      window.addEventListener("mousemove", (event) => {
        if (!dragging) return;
        if (
          !moved &&
          (Math.abs(event.screenX - startScreenX) > DRAG_THRESHOLD ||
            Math.abs(event.screenY - startScreenY) > DRAG_THRESHOLD)
        ) {
          moved = true;
        }
        if (moved) {
          window.bubbleAPI.move(event.screenX - grabOffsetX, event.screenY - grabOffsetY);
        }
      });

      window.addEventListener("mouseup", () => {
        if (dragging && !moved) window.bubbleAPI.expand();
        dragging = false;
      });

      bubble.addEventListener("contextmenu", (event) => {
        event.preventDefault();
        window.bubbleAPI.contextMenu();
      });
    </script>
  </body>
</html>
